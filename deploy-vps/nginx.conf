###############################################################################
# HTTP + HTTPS
# - Porta 80: redireciona para 443 (exceto ACME challenge para renovação)
# - Porta 443: serve o site com certificado Let's Encrypt montado do host
#
# Os certificados são montados via docker-compose:
#   /etc/letsencrypt (host) -> /etc/letsencrypt (container, read-only)
#
# Variável de ambiente esperada no container:
#   SERVER_NAME=seudominio.com   (default: _ aceita qualquer host)
#
# Se os arquivos do certificado NÃO existirem, o bloco 443 é ignorado
# automaticamente pelo include condicional, e o site continua em HTTP.
###############################################################################

# ---------- HTTP (porta 80) ----------
server {
    listen 80 default_server;
    server_name _;

    # ACME challenge (renovação webroot, se um dia trocarmos do standalone)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Se existir certificado para o domínio, força HTTPS
    # (avaliado em runtime via mapa abaixo)
    if ($force_https = 1) {
        return 301 https://$host$request_uri;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript
        application/xml application/json application/rss+xml
        image/svg+xml;

    # Cache para assets com hash (Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Imagens, fontes e ícones
    location ~* \.(?:jpg|jpeg|gif|png|ico|webp|svg|woff|woff2|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ─────────────────────────────────────────────────────────────────────
    # Proxy para Webhooks / Edge Functions do Supabase
    # ─────────────────────────────────────────────────────────────────────
    location ~ ^/(melhor-envio-webhook|asaas-webhook|mercadopago-webhook|pagarme-webhook|pagbank-webhook)(/.*)?$ {
        proxy_pass https://vkomfiplmhpkhfpidrng.supabase.co/functions/v1/$1$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host vkomfiplmhpkhfpidrng.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_name vkomfiplmhpkhfpidrng.supabase.co;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # Headers de segurança básicos
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Bloqueia arquivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ---------- HTTPS (porta 443) ----------
# Carregado apenas se o entrypoint encontrar fullchain.pem para o domínio.
# O arquivo /etc/nginx/conf.d/ssl.conf é gerado dinamicamente no boot.
