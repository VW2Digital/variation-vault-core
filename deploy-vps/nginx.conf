###############################################################################
# HTTP (porta 80)
# Modo de operação controlado pelo entrypoint:
#   • Sem SSL: redirect.conf está VAZIO → este server block serve o site em HTTP
#   • Com SSL: redirect.conf contém server block que redireciona p/ HTTPS,
#               e este server block aqui é desativado pelo entrypoint
#               (renomeado para http.conf.disabled).
# O ACME challenge é servido em ambos os casos.
###############################################################################
include /etc/nginx/conf.d/http.conf;
include /etc/nginx/conf.d/redirect.conf;

###############################################################################
# HTTPS (porta 443) — incluído condicionalmente
# O arquivo ssl.conf é gerado pelo entrypoint quando há certificado válido
# para o SERVER_NAME informado em /etc/letsencrypt/live/<dominio>/.
###############################################################################
include /etc/nginx/conf.d/ssl.conf;