###############################################################################
# HTTP (porta 80) — sempre ativo
# - Serve ACME challenge para renovações webroot
# - Redireciona para HTTPS quando o certificado existe (controlado pelo
#   entrypoint via include condicional /etc/nginx/conf.d/redirect.conf)
# - Caso contrário, serve o site normalmente em HTTP (fallback p/ pré-SSL)
###############################################################################
server {
    listen 80 default_server;
    server_name _;

    # ACME challenge (renovação webroot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Se houver certificado, este include força redirect 301 -> HTTPS.
    # Se não, o arquivo está vazio e o site continua acessível em HTTP.
    include /etc/nginx/conf.d/redirect.conf;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript
        application/xml application/json application/rss+xml
        image/svg+xml;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:jpg|jpeg|gif|png|ico|webp|svg|woff|woff2|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy webhooks → Supabase Edge Functions
    location ~ ^/(melhor-envio-webhook|asaas-webhook|mercadopago-webhook|pagarme-webhook|pagbank-webhook)(/.*)?$ {
        proxy_pass https://vkomfiplmhpkhfpidrng.supabase.co/functions/v1/$1$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host vkomfiplmhpkhfpidrng.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_name vkomfiplmhpkhfpidrng.supabase.co;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

###############################################################################
# HTTPS (porta 443) — incluído condicionalmente
# O arquivo ssl.conf é gerado pelo entrypoint quando há certificado válido
# para o SERVER_NAME informado em /etc/letsencrypt/live/<dominio>/.
###############################################################################
include /etc/nginx/conf.d/ssl.conf;