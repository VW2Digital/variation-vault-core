###############################################################################
# HTTP — redireciona tudo para HTTPS, exceto o desafio do Let's Encrypt
###############################################################################
server {
    listen 80;
    server_name catalog.pharmaliberty.com;

    # Permite renovação do certificado via webroot (caso futuramente troque o método)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redireciona todo o resto para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

###############################################################################
# HTTPS — site real
###############################################################################
server {
    listen 443 ssl;
    http2 on;
    server_name catalog.pharmaliberty.com;

    # Certificados Let's Encrypt (montados via volume no docker-compose)
    ssl_certificate     /etc/letsencrypt/live/catalog.pharmaliberty.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/catalog.pharmaliberty.com/privkey.pem;

    # Config SSL moderna e segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip para performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/json
        application/rss+xml
        image/svg+xml;

    # Cache agressivo para assets com hash (Vite gera hashes únicos)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Imagens, fontes e ícones
    location ~* \.(?:jpg|jpeg|gif|png|ico|webp|svg|woff|woff2|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback: tudo que não for arquivo estático cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Headers de segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Bloqueia acesso a arquivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
