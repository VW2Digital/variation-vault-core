services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
    container_name: liberty-pharma-app
    restart: unless-stopped
    environment:
      # Define o domínio servido por HTTPS. Pode ser sobrescrito no .env:
      #   SERVER_NAME=meudominio.com
      SERVER_NAME: ${SERVER_NAME:-_}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Certificados Let's Encrypt do host (gerados por issue-ssl.sh / certbot)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Webroot opcional p/ ACME challenge (renovação sem parar o nginx)
      - /var/www/certbot:/var/www/certbot
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
